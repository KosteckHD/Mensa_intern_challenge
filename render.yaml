services:
  - type: web
    runtime: node
    name: kosteckhd-mensa-droplock-api
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run migrate
    initialDeployHook: npm run seed
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mensa-droplock-db
          property: connectionString
      - key: NODE_VERSION
        value: "22"
      - key: RESERVATION_TTL_SECONDS
        value: "300"
      - key: EXPIRED_RESERVATIONS_SWEEP_MS
        value: "30000"
      - key: SHIPPING_CENTS
        value: "3500"
      - key: CORS_ORIGIN
        value: https://kosteckhd-mensa-droplock-web.onrender.com

  - type: web
    runtime: static
    name: kosteckhd-mensa-droplock-web
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        value: https://kosteckhd-mensa-droplock-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: mensa-droplock-db
    databaseName: mensa_droplock
    user: mensa_droplock
    plan: free
    region: frankfurt
