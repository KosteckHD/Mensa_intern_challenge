services:
  postgres-e2e:
    image: postgres:16-alpine
    container_name: sneaker-drop-postgres-e2e
    environment:
      POSTGRES_DB: sneaker_drop_e2e
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sneaker_drop_e2e"]
      interval: 2s
      timeout: 3s
      retries: 20
