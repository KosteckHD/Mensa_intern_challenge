services:
  postgres:
    image: postgres:16-alpine
    container_name: sneaker-drop-postgres
    environment:
      POSTGRES_DB: sneaker_drop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - sneaker_drop_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sneaker_drop"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sneaker_drop_postgres:
